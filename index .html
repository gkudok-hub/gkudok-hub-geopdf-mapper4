<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GeoPDF 面積計測</title>
<style>
  :root {
    --bg: #0a0e1a; --surface: #111827; --surface2: #1a2235;
    --border: #1e3a5f; --accent: #00d4aa; --danger: #ff4757;
    --warn: #ffa502; --text: #e8f4f8; --text-dim: #6b8fa8;
    --radius: 10px; --font-mono: 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Helvetica Neue', Arial, sans-serif; }
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
  #header { flex: 0 0 auto; background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 14px; display: flex; align-items: center; gap: 10px; z-index: 10; }
  #header h1 { font-size: 15px; font-weight: 700; letter-spacing: 0.05em; color: var(--accent); flex: 1; }
  #main { flex: 1; position: relative; overflow: hidden; }
  #footer { flex: 0 0 auto; background: var(--surface); border-top: 1px solid var(--border); padding: 8px 10px; z-index: 10; }

  /* MAP */
  #map-container {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 39px, #1a2235 39px, #1a2235 40px),
                repeating-linear-gradient(90deg, transparent, transparent 39px, #1a2235 39px, #1a2235 40px);
    background-color: #0d1520; overflow: hidden; cursor: grab; touch-action: none;
  }
  #map-container.grabbing { cursor: grabbing; }
  #map-canvas { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
  #overlay-canvas { position: absolute; top: 0; left: 0; pointer-events: none; transform-origin: 0 0; }

  /* GPS ICON */
  #gps-icon {
    position: absolute; width: 32px; height: 32px;
    margin-left: -16px; margin-top: -16px;
    pointer-events: none; display: none; z-index: 20;
  }
  #gps-icon .pulse-ring {
    position: absolute; inset: 0; border-radius: 50%;
    border: 2px solid var(--accent); opacity: 0;
    animation: gps-ring 2s ease-out infinite;
  }
  #gps-icon .pulse-ring2 {
    animation-delay: 0.7s;
  }
  #gps-icon .center-dot {
    position: absolute; inset: 10px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 8px var(--accent), 0 0 16px rgba(0,212,170,0.4);
  }
  #gps-icon .accuracy-ring {
    position: absolute; inset: -4px; border-radius: 50%;
    border: 1.5px solid rgba(0,212,170,0.5);
    background: rgba(0,212,170,0.08);
  }
  @keyframes gps-ring {
    0% { transform: scale(0.8); opacity: 0.8; }
    100% { transform: scale(2.2); opacity: 0; }
  }

  /* UPLOAD */
  #upload-zone {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    background: #0a0e1a; z-index: 5;
  }
  #upload-zone .upload-icon { font-size: 48px; opacity: 0.4; }
  #upload-zone p { font-size: 13px; color: var(--text-dim); text-align: center; line-height: 1.6; max-width: 260px; }
  .upload-btn-big {
    background: var(--accent); color: #000; font-weight: 700;
    padding: 12px 28px; border-radius: 8px; border: none;
    font-size: 14px; cursor: pointer; letter-spacing: 0.05em;
  }
  #file-input { display: none; }

  /* TOOLBAR */
  #toolbar { display: flex; gap: 6px; align-items: stretch; }
  .tb-btn {
    flex: 1; padding: 9px 4px; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); font-size: 11px; font-weight: 600;
    cursor: pointer; text-align: center; line-height: 1.3;
    letter-spacing: 0.03em;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
    transition: background 0.15s;
  }
  .tb-btn:active { opacity: 0.7; }
  .tb-btn.primary { background: var(--accent); color: #000; border-color: var(--accent); }
  .tb-btn.danger  { background: var(--danger); color: #fff; border-color: var(--danger); }
  .tb-btn.warn    { background: var(--warn);   color: #000; border-color: var(--warn); }
  .tb-btn:disabled { opacity: 0.35; pointer-events: none; }
  .tb-icon { font-size: 18px; line-height: 1; }

  /* INFO PANEL */
  #info-panel {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 30;
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 14px; display: none; max-height: 55vh; overflow-y: auto;
  }
  #info-panel.open { display: block; }
  #info-panel h2 { font-size: 13px; color: var(--accent); letter-spacing: 0.08em; margin-bottom: 10px; text-transform: uppercase; }
  .wp-list { list-style: none; display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
  .wp-item {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2); border-radius: 8px;
    padding: 7px 10px; font-size: 12px; font-family: var(--font-mono);
    border: 1px solid var(--border);
  }
  .wp-num { color: var(--accent); font-weight: 700; min-width: 22px; }
  .wp-coord { flex: 1; color: var(--text-dim); font-size: 11px; }
  .wp-del { color: var(--danger); background: none; border: none; font-size: 16px; cursor: pointer; padding: 0 2px; line-height: 1; }

  /* AREA RESULT */
  #area-result {
    background: linear-gradient(135deg, #00d4aa22, #0080ff22);
    border: 1px solid var(--accent); border-radius: 10px;
    padding: 14px; text-align: center; margin-top: 4px;
  }
  #area-result .label { font-size: 11px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; }
  #area-result .value { font-size: 28px; font-weight: 700; color: var(--accent); font-family: var(--font-mono); margin: 4px 0; }
  #area-result .sub   { font-size: 12px; color: var(--text-dim); }

  /* GPS STATUS BAR */
  #gps-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); overflow: hidden; }
  #gps-led { width: 8px; height: 8px; border-radius: 50%; background: #444; flex-shrink: 0; transition: background 0.3s; }
  #gps-led.active { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: blink 1.5s infinite; }
  #gps-led.error  { background: var(--danger); }
  #gps-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* SCALE BAR */
  #scale-bar {
    position: absolute; bottom: 10px; right: 10px; z-index: 15;
    background: rgba(0,0,0,0.5); border-radius: 4px; padding: 4px 8px;
    font-size: 10px; color: var(--text-dim); font-family: var(--font-mono); display: none;
  }

  /* ZOOM */
  #zoom-controls { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 4px; z-index: 15; }
  .zoom-btn {
    width: 36px; height: 36px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 20px; font-weight: 300;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .zoom-btn:active { background: var(--surface2); }

  /* CENTER GPS BTN */
  #btn-center-gps {
    position: absolute; right: 10px; bottom: 60px; z-index: 15;
    width: 40px; height: 40px; background: var(--surface); border: 1px solid var(--accent);
    border-radius: 50%; display: none; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px;
  }
  #btn-center-gps.visible { display: flex; }

  /* TOAST */
  #toast {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%) translateY(-60px);
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 8px 16px; border-radius: 20px;
    font-size: 12px; z-index: 50; transition: transform 0.3s ease;
    white-space: nowrap; pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.success { border-color: var(--accent); color: var(--accent); }
  #toast.error   { border-color: var(--danger); color: var(--danger); }

  /* LOADING */
  #loading {
    position: absolute; inset: 0; background: rgba(10,14,26,0.85); z-index: 40;
    display: none; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
  }
  #loading.show { display: flex; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-text { font-size: 13px; color: var(--text-dim); }

  /* GEO BADGE */
  #geo-badge {
    position: absolute; top: 10px; left: 10px; z-index: 15;
    padding: 4px 10px; border-radius: 12px; font-size: 10px; font-weight: 700;
    letter-spacing: 0.05em; display: none;
  }
  #geo-badge.ok  { background: rgba(0,212,170,0.2); border: 1px solid var(--accent); color: var(--accent); }
  #geo-badge.ng  { background: rgba(255,71,87,0.2);  border: 1px solid var(--danger);  color: var(--danger); }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>GeoPDF 面積計測</h1>
    <div id="gps-status">
      <div id="gps-led"></div>
      <span id="gps-text">GPS未取得</span>
    </div>
  </div>

  <div id="main">
    <div id="map-container">
      <canvas id="map-canvas"></canvas>
      <canvas id="overlay-canvas"></canvas>

      <!-- GPS現在地アイコン -->
      <div id="gps-icon">
        <div class="accuracy-ring"></div>
        <div class="pulse-ring"></div>
        <div class="pulse-ring pulse-ring2"></div>
        <div class="center-dot"></div>
      </div>

      <div id="upload-zone">
        <div class="upload-icon">&#128506;</div>
        <p>GeoPDFファイルを読み込んで<br>地図を表示します<br><br>
          <small style="color:#2a4a6a">国土地理院・QGIS製GeoPDF対応<br>地理座標を自動解析します</small>
        </p>
        <button class="upload-btn-big" onclick="document.getElementById('file-input').click()">GeoPDFを開く</button>
        <input type="file" id="file-input" accept=".pdf,application/pdf">
      </div>
    </div>

    <div id="zoom-controls">
      <div class="zoom-btn" id="btn-zoom-in">+</div>
      <div class="zoom-btn" id="btn-zoom-out">&#8722;</div>
    </div>

    <div id="btn-center-gps" title="現在地へ移動">&#9654;</div>
    <div id="scale-bar"></div>
    <div id="geo-badge"></div>
    <div id="loading"><div class="spinner"></div><p id="loading-text">読み込み中...</p></div>
    <div id="toast"></div>

    <div id="info-panel">
      <h2>ウェイポイント一覧</h2>
      <ul class="wp-list" id="wp-list"></ul>
      <div id="area-result" style="display:none">
        <div class="label">囲まれた面積</div>
        <div class="value" id="area-value">--</div>
        <div class="sub"   id="area-sub"></div>
      </div>
    </div>
  </div>

  <div id="footer">
    <div id="toolbar">
      <button class="tb-btn" id="btn-open" onclick="document.getElementById('file-input').click()">
        <span class="tb-icon">&#128193;</span>開く
      </button>
      <button class="tb-btn primary" id="btn-wp" disabled>
        <span class="tb-icon">&#8853;</span>WP追加
      </button>
      <button class="tb-btn warn" id="btn-list" disabled>
        <span class="tb-icon">&#9776;</span>一覧
      </button>
      <button class="tb-btn" id="btn-area" disabled>
        <span class="tb-icon">&#9651;</span>面積
      </button>
      <button class="tb-btn" id="btn-gpx" disabled>
        <span class="tb-icon">&#8659;</span>GPX
      </button>
      <button class="tb-btn danger" id="btn-clear" disabled>
        <span class="tb-icon">&#10005;</span>リセット
      </button>
    </div>
  </div>
</div>

<script type="module">
// ===== PDF.js =====
import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs';
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.mjs';

// ===== STATE =====
const S = {
  geo: null,          // { toLatLng(px,py), toPixel(lat,lng), W, H }
  waypoints: [],
  gps: null,          // { lat, lng, accuracy }
  gpsWatchId: null,
  loaded: false,
  panX: 0, panY: 0, scale: 1, baseScale: 1,
  imgW: 0, imgH: 0,
  dragging: false, dragStart: {},
  lastTouches: null,
};

// ===== DOM =====
const $ = id => document.getElementById(id);
const mapEl    = $('map-container');
const mapCv    = $('map-canvas');
const ovCv     = $('overlay-canvas');
const gpsIcon  = $('gps-icon');
const uploadZone = $('upload-zone');
const fileInput  = $('file-input');
const loading    = $('loading');
const loadingText= $('loading-text');
const toastEl    = $('toast');
const geoBadge   = $('geo-badge');
const scaleBar   = $('scale-bar');
const infoPanel  = $('info-panel');
const wpListEl   = $('wp-list');
const areaResult = $('area-result');
const areaValue  = $('area-value');
const areaSub    = $('area-sub');
const gpsLed     = $('gps-led');
const gpsText    = $('gps-text');
const btnCenterGps = $('btn-center-gps');
const mctx = mapCv.getContext('2d');
const octx = ovCv.getContext('2d');

const btnWp   = $('btn-wp');
const btnList = $('btn-list');
const btnArea = $('btn-area');
const btnGpx  = $('btn-gpx');
const btnClear= $('btn-clear');

// ===== TOAST =====
let toastTimer;
function toast(msg, type='', ms=2400) {
  toastEl.textContent = msg;
  toastEl.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.className='', ms);
}

// ===== LOADING =====
const showLoading = msg => { loadingText.textContent = msg||'読み込み中...'; loading.classList.add('show'); };
const hideLoading = () => loading.classList.remove('show');

// ===== GEO TRANSFORM =====
// PDF座標系: 原点=左上, Y軸下向き (PDF.jsでレンダリング後)
// LPTS (0-1正規化): 原点=左下, Y軸上向き (PDF標準)
// → canvas pixel: px = lx*W, py = (1-ly)*H

function buildGeoTransform(GPTS, LPTS, W, H) {
  // 4コーナーの制御点
  const pts = [];
  for (let i = 0; i < GPTS.length; i += 2) {
    const lat = GPTS[i], lng = GPTS[i+1];
    const lx  = LPTS[i], ly  = LPTS[i+1];
    pts.push({ lat, lng, px: lx*W, py: (1-ly)*H });
  }

  // 緯度範囲・経度範囲を直接取得（矩形マップ前提）
  const lats = pts.map(p=>p.lat), lngs = pts.map(p=>p.lng);
  const latMin=Math.min(...lats), latMax=Math.max(...lats);
  const lngMin=Math.min(...lngs), lngMax=Math.max(...lngs);

  // px=0のときlng=lngMin、px=Wのときlng=lngMax
  // py=0のときlat=latMax、py=Hのときlat=latMin
  return {
    W, H,
    latMin, latMax, lngMin, lngMax,
    toLatLng(px, py) {
      return {
        lat: latMax + (latMin - latMax) * (py / H),
        lng: lngMin + (lngMax - lngMin) * (px / W),
      };
    },
    toPixel(lat, lng) {
      return {
        px: (lng - lngMin) / (lngMax - lngMin) * W,
        py: (lat - latMax) / (latMin - latMax) * H,
      };
    },
  };
}

// ===== PDF LOADING =====
async function loadGeoPDF(file) {
  showLoading('GeoPDFを解析中...');
  try {
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    const page = await pdf.getPage(1);

    // --- Geo情報をPDF内部辞書から取得 ---
    let geo = null;
    try {
      geo = await extractGeo(pdf);
    } catch(e) { console.warn('Geo extract error:', e); }

    // --- レンダリング ---
    loadingText.textContent = 'レンダリング中...';
    const vp0 = page.getViewport({ scale: 1 });
    const renderScale = Math.min(
      window.innerWidth  * 1.8 / vp0.width,
      window.innerHeight * 1.8 / vp0.height,
      3.5
    );
    const vp = page.getViewport({ scale: renderScale });
    mapCv.width = ovCv.width = vp.width;
    mapCv.height= ovCv.height= vp.height;
    await page.render({ canvasContext: mctx, viewport: vp }).promise;

    S.imgW = vp.width;
    S.imgH = vp.height;

    if (geo) {
      // スケール補正（レンダリングスケール分だけピクセル座標も拡大）
      S.geo = buildGeoTransform(
        geo.GPTS, geo.LPTS,
        geo.pageW * renderScale,
        geo.pageH * renderScale
      );
      geoBadge.textContent = 'GPS対応';
      geoBadge.className = 'ok';
    } else {
      S.geo = null;
      geoBadge.textContent = '座標なし';
      geoBadge.className = 'ng';
    }
    geoBadge.style.display = 'block';

    S.loaded = true;
    fitToScreen();
    uploadZone.style.display = 'none';
    enableButtons();
    updateOverlay();
    startGPS();

    toast(geo ? 'GeoPDF読み込み完了 - 地理座標OK' : '地図読み込み完了 (座標情報なし)', 'success');
  } catch(e) {
    console.error(e);
    toast('読み込み失敗: ' + e.message, 'error', 5000);
  }
  hideLoading();
}

// ===== GEO INFO EXTRACTION (PyMuPDF相当をJS側で実装) =====
// pdf.js の内部 transport を使い VP → Measure → GPTS/LPTS を取得
async function extractGeo(pdf) {
  const transport = pdf._transport;
  if (!transport) return null;

  // ページ辞書を取得する
  let pageDict = null;
  const methods = [
    () => transport.getPageDict(0),
    () => transport.messageHandler?.sendWithPromise('GetPage', { pageIndex: 0 }),
  ];
  for (const m of methods) {
    try { pageDict = await m(); break; } catch(e) {}
  }

  // VP を再帰的に検索
  const result = searchVP(pageDict);
  if (result) return result;

  // fallback: 全xrefスキャン（pdf.jsでは困難なので断念）
  return null;
}

function searchVP(obj, depth=0) {
  if (!obj || depth > 5) return null;
  if (Array.isArray(obj)) {
    for (const item of obj) {
      const r = searchVP(item, depth+1);
      if (r) return r;
    }
    return null;
  }
  if (typeof obj !== 'object') return null;

  // Measure オブジェクトを発見
  const gpts = obj.GPTS || obj['GPTS'];
  const lpts = obj.LPTS || obj['LPTS'];
  if (gpts && lpts && Array.isArray(gpts) && gpts.length >= 8) {
    return { GPTS: gpts, LPTS: lpts, pageW: 842, pageH: 595 };
  }

  for (const key of Object.keys(obj)) {
    const r = searchVP(obj[key], depth+1);
    if (r) return r;
  }
  return null;
}

// ===== FALLBACK: バイナリ直接解析 =====
// PDF.jsのinternal APIが使えない場合、バイト列からGPTS/LPTSを抽出
async function extractGeoBinary(file) {
  const buf = await file.arrayBuffer();
  const bytes = new Uint8Array(buf);
  const text = new TextDecoder('latin1').decode(bytes);

  // /GPTS [ ... ] を探す
  const gptsMatch = text.match(/\/GPTS\s*\[([^\]]+)\]/);
  const lptsMatch = text.match(/\/LPTS\s*\[([^\]]+)\]/);

  if (!gptsMatch || !lptsMatch) return null;

  const parseArr = s => s.trim().split(/\s+/).map(Number).filter(n => !isNaN(n));
  const GPTS = parseArr(gptsMatch[1]);
  const LPTS = parseArr(lptsMatch[1]);

  if (GPTS.length < 8 || LPTS.length < 8) return null;

  // ページサイズ
  const mbMatch = text.match(/\/MediaBox\s*\[([^\]]+)\]/);
  let pageW=842, pageH=595;
  if (mbMatch) {
    const mb = parseArr(mbMatch[1]);
    pageW = mb[2]||842; pageH = mb[3]||595;
  }

  return { GPTS, LPTS, pageW, pageH };
}

// ===== ENHANCED FILE LOAD: バイナリ解析を優先 =====
fileInput.addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  fileInput.value = '';
  showLoading('GeoPDFを解析中...');

  try {
    // まずバイナリ解析（最も確実）
    let geoRaw = await extractGeoBinary(file);

    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf.slice(0) }).promise;
    const page = await pdf.getPage(1);

    // バイナリ解析失敗ならpdf.js内部APIを試行
    if (!geoRaw) {
      try { geoRaw = await extractGeo(pdf); } catch(e) {}
    }

    loadingText.textContent = 'レンダリング中...';
    const vp0 = page.getViewport({ scale: 1 });
    const renderScale = Math.min(
      window.innerWidth  * 1.8 / vp0.width,
      window.innerHeight * 1.8 / vp0.height,
      3.5
    );
    const vp = page.getViewport({ scale: renderScale });
    mapCv.width = ovCv.width = vp.width;
    mapCv.height= ovCv.height= vp.height;
    await page.render({ canvasContext: mctx, viewport: vp }).promise;

    S.imgW = vp.width; S.imgH = vp.height;

    if (geoRaw) {
      S.geo = buildGeoTransform(
        geoRaw.GPTS, geoRaw.LPTS,
        geoRaw.pageW * renderScale,
        geoRaw.pageH * renderScale
      );
      geoBadge.textContent = 'GPS対応';
      geoBadge.className = 'ok';
    } else {
      S.geo = null;
      geoBadge.textContent = '座標なし';
      geoBadge.className = 'ng';
    }
    geoBadge.style.display = 'block';
    S.loaded = true;
    fitToScreen();
    uploadZone.style.display = 'none';
    enableButtons();
    updateOverlay();
    startGPS();
    toast(geoRaw ? 'GeoPDF読み込み完了 - 地理座標OK' : '地図読み込み完了', 'success');
  } catch(e) {
    console.error(e);
    toast('読み込み失敗: ' + e.message, 'error', 5000);
  }
  hideLoading();
});

// ===== GPS =====
function startGPS() {
  if (!navigator.geolocation) {
    gpsLed.className = 'error';
    gpsText.textContent = 'GPS非対応';
    return;
  }
  if (S.gpsWatchId) navigator.geolocation.clearWatch(S.gpsWatchId);
  S.gpsWatchId = navigator.geolocation.watchPosition(
    pos => {
      S.gps = { lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy };
      gpsLed.className = 'active';
      gpsText.textContent = `${S.gps.lat.toFixed(6)}, ${S.gps.lng.toFixed(6)}`;
      updateGPSIcon();
      btnCenterGps.classList.add('visible');
    },
    err => {
      gpsLed.className = 'error';
      const msgs = {1:'権限なし',2:'位置不明',3:'タイムアウト'};
      gpsText.textContent = 'GPS: ' + (msgs[err.code]||'エラー');
    },
    { enableHighAccuracy: true, maximumAge: 2000, timeout: 15000 }
  );
}

function updateGPSIcon() {
  if (!S.gps || !S.geo || !S.loaded) { gpsIcon.style.display='none'; return; }
  const { px, py } = S.geo.toPixel(S.gps.lat, S.gps.lng);
  if (px < 0 || px > S.imgW || py < 0 || py > S.imgH) {
    gpsIcon.style.display = 'none'; return;
  }
  const sx = px * S.scale + S.panX;
  const sy = py * S.scale + S.panY;
  gpsIcon.style.display = 'block';
  gpsIcon.style.left = sx + 'px';
  gpsIcon.style.top  = sy + 'px';
}

// 現在地へ移動
btnCenterGps.addEventListener('click', () => {
  if (!S.gps || !S.geo) return;
  const { px, py } = S.geo.toPixel(S.gps.lat, S.gps.lng);
  const cw = mapEl.clientWidth, ch = mapEl.clientHeight;
  S.panX = cw/2 - px * S.scale;
  S.panY = ch/2 - py * S.scale;
  clampPan();
  applyTransform();
});

// ===== VIEWPORT =====
function fitToScreen() {
  const cw = mapEl.clientWidth, ch = mapEl.clientHeight;
  S.baseScale = Math.min(cw/S.imgW, ch/S.imgH) * 0.95;
  S.scale = S.baseScale;
  S.panX = (cw - S.imgW*S.scale) / 2;
  S.panY = (ch - S.imgH*S.scale) / 2;
  applyTransform();
}

function applyTransform() {
  const t = `translate(${S.panX}px,${S.panY}px) scale(${S.scale})`;
  mapCv.style.transform = t;
  ovCv.style.transform  = t;
  updateOverlay();
  updateScaleBar();
  updateGPSIcon();
}

function clampPan() {
  const cw=mapEl.clientWidth, ch=mapEl.clientHeight;
  const iw=S.imgW*S.scale, ih=S.imgH*S.scale;
  const m=80;
  S.panX = Math.min(m, Math.max(cw-iw-m, S.panX));
  S.panY = Math.min(m, Math.max(ch-ih-m, S.panY));
}

function zoomAt(cx, cy, factor) {
  const min=S.baseScale*0.4, max=S.baseScale*25;
  const ns = Math.min(max, Math.max(min, S.scale*factor));
  const f  = ns / S.scale;
  S.panX = cx - f*(cx-S.panX);
  S.panY = cy - f*(cy-S.panY);
  S.scale = ns;
  clampPan();
  applyTransform();
}

// ===== SCALE BAR =====
function updateScaleBar() {
  if (!S.geo || !S.loaded) { scaleBar.style.display='none'; return; }
  const ctr   = S.geo.toLatLng(S.imgW/2, S.imgH/2);
  const right  = S.geo.toLatLng(S.imgW/2+100, S.imgH/2);
  const mPer100px = haversine(ctr.lat,ctr.lng,right.lat,right.lng);
  const mPerPx = mPer100px/100/S.scale;
  const targets=[1,2,5,10,20,50,100,200,500,1000,2000,5000];
  const aim = mPerPx*80;
  let best=targets[0];
  for(const t of targets){ if(t<=aim) best=t; else break; }
  const barPx = best/mPerPx;
  const label = best>=1000 ? (best/1000)+'km' : best+'m';
  scaleBar.style.display='block';
  scaleBar.innerHTML=`<div style="border:1.5px solid #6b8fa8;border-top:none;height:5px;width:${barPx.toFixed(0)}px;margin-bottom:2px"></div>${label}`;
}

// ===== WAYPOINT =====
function addWaypoint() {
  if (!S.gps) { toast('GPS位置を取得中です', 'error'); return; }
  const { lat, lng } = S.gps;  // GPS座標に正確に吸着

  let px=S.imgW/2, py=S.imgH/2;
  if (S.geo) {
    const p = S.geo.toPixel(lat, lng);
    px=p.px; py=p.py;
  }

  const n = S.waypoints.length+1;
  S.waypoints.push({ lat, lng, px, py, label:'WP'+n });
  updateOverlay();
  updateWPList();
  updateButtons();
  toast(`WP${n} 追加: ${lat.toFixed(5)}, ${lng.toFixed(5)}`, 'success');
}

function removeWaypoint(i) {
  S.waypoints.splice(i,1);
  S.waypoints.forEach((w,idx) => w.label='WP'+(idx+1));
  updateOverlay(); updateWPList(); updateButtons(); calcAreaSilent();
}

function clearAll() {
  if (!S.waypoints.length) return;
  if (!confirm(`ウェイポイントを全て削除しますか？(${S.waypoints.length}件)`)) return;
  S.waypoints=[];
  updateOverlay(); updateWPList(); updateButtons();
  areaResult.style.display='none';
}
window.removeWP = removeWaypoint;

// ===== OVERLAY =====
function updateOverlay() {
  octx.clearRect(0, 0, ovCv.width, ovCv.height);
  const wps=S.waypoints;
  if (!wps.length) return;

  const lw = 2/S.scale;
  const r  = 7/S.scale;

  if (wps.length>=3) {
    octx.beginPath();
    octx.moveTo(wps[0].px, wps[0].py);
    for(let i=1;i<wps.length;i++) octx.lineTo(wps[i].px,wps[i].py);
    octx.closePath();
    octx.fillStyle='rgba(0,212,170,0.15)'; octx.fill();
  }
  if (wps.length>=2) {
    octx.beginPath();
    octx.moveTo(wps[0].px,wps[0].py);
    for(let i=1;i<wps.length;i++) octx.lineTo(wps[i].px,wps[i].py);
    if(wps.length>=3) octx.closePath();
    octx.strokeStyle='rgba(0,212,170,0.9)';
    octx.lineWidth=lw; octx.setLineDash([6/S.scale,3/S.scale]); octx.stroke(); octx.setLineDash([]);
  }

  const fs = Math.max(9, 12/S.scale);
  for(let i=0;i<wps.length;i++) {
    const w=wps[i];
    octx.beginPath(); octx.arc(w.px,w.py,r*1.8,0,Math.PI*2);
    octx.fillStyle='rgba(0,212,170,0.15)'; octx.fill();
    octx.beginPath(); octx.arc(w.px,w.py,r,0,Math.PI*2);
    octx.fillStyle='#0a0e1a'; octx.fill();
    octx.strokeStyle='#00d4aa'; octx.lineWidth=1.5/S.scale; octx.stroke();
    octx.fillStyle='#00d4aa';
    octx.font=`bold ${fs}px sans-serif`;
    octx.textAlign='center'; octx.textBaseline='middle';
    octx.fillText(i+1, w.px, w.py);
  }
}

// ===== AREA =====
function calcArea() {
  if (S.waypoints.length<3) { toast('面積計算には3点以上必要です','error'); return; }
  const m2 = shoelaceM2(S.waypoints);
  showArea(m2);
}
function calcAreaSilent() {
  if (S.waypoints.length>=3) showArea(shoelaceM2(S.waypoints));
  else areaResult.style.display='none';
}

function shoelaceM2(wps) {
  const lat0=wps[0].lat, lng0=wps[0].lng;
  const R=6371000;
  const toXY = (lat,lng) => ({
    x: (lng-lng0)*Math.PI/180*R*Math.cos(lat0*Math.PI/180),
    y: (lat-lat0)*Math.PI/180*R
  });
  const pts=wps.map(w=>toXY(w.lat,w.lng));
  let s=0; const n=pts.length;
  for(let i=0;i<n;i++){const j=(i+1)%n; s+=pts[i].x*pts[j].y-pts[j].x*pts[i].y;}
  return Math.abs(s)/2;
}

function showArea(m2) {
  areaResult.style.display='block';
  let val, unit, sub;
  if(m2>=10000){
    val=(m2/10000).toFixed(4); unit=' ha';
    sub=`${m2.toFixed(1)} m²　/　${(m2/1000000).toFixed(6)} km²`;
  } else {
    val=m2.toFixed(1); unit=' m²';
    sub=`${(m2/10000).toFixed(6)} ha　/　${(m2/1000000).toFixed(8)} km²`;
  }
  areaValue.textContent=val+unit; areaSub.textContent=sub;
}

// ===== WP LIST =====
function updateWPList() {
  wpListEl.innerHTML='';
  S.waypoints.forEach((w,i) => {
    const li=document.createElement('li');
    li.className='wp-item';
    li.innerHTML=`
      <span class="wp-num">${i+1}</span>
      <span class="wp-coord">${w.lat.toFixed(6)},<br>${w.lng.toFixed(6)}</span>
      <button class="wp-del" onclick="removeWP(${i})">&#10005;</button>`;
    li.addEventListener('click', e => { if(e.target.tagName!=='BUTTON') centerOnWP(w); });
    wpListEl.appendChild(li);
  });
}
function centerOnWP(w) {
  const cw=mapEl.clientWidth, ch=mapEl.clientHeight;
  S.panX=cw/2-w.px*S.scale; S.panY=ch/2-w.py*S.scale;
  clampPan(); applyTransform();
}

// ===== BUTTONS =====
function enableButtons() { btnWp.disabled=false; btnList.disabled=false; btnClear.disabled=false; }
function updateButtons() {
  btnArea.disabled = S.waypoints.length<3;
  btnGpx.disabled  = S.waypoints.length===0;
  btnClear.disabled= S.waypoints.length===0;
}

// ===== GPX EXPORT =====
function exportGPX() {
  if (!S.waypoints.length) { toast('ウェイポイントがありません', 'error'); return; }

  const now = new Date().toISOString();
  const filename = `waypoints_${now.slice(0,19).replace(/[:T]/g,'-')}.gpx`;

  // ウェイポイント要素
  const wptTags = S.waypoints.map((w, i) => `  <wpt lat="${w.lat.toFixed(8)}" lon="${w.lng.toFixed(8)}">
    <name>${w.label}</name>
    <desc>WP${i+1}: ${w.lat.toFixed(6)}, ${w.lng.toFixed(6)}</desc>
    <sym>Waypoint</sym>
  </wpt>`).join('\n');

  // トラック（面積計算用ポリゴンをrteとして出力）
  const rteptTags = S.waypoints.length >= 3
    ? `\n  <rte>\n    <name>計測エリア</name>\n` +
      [...S.waypoints, S.waypoints[0]].map(w =>
        `    <rtept lat="${w.lat.toFixed(8)}" lon="${w.lng.toFixed(8)}"><name>${w.label}</name></rtept>`
      ).join('\n') +
      `\n  </rte>` : '';

  // 面積情報をmetadataに含める
  let areaDesc = '';
  if (S.waypoints.length >= 3) {
    const m2 = shoelaceM2(S.waypoints);
    const ha = (m2/10000).toFixed(4);
    areaDesc = `\n    <desc>面積: ${m2.toFixed(1)} m² / ${ha} ha</desc>`;
  }

  const gpx = `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="GeoPDF面積計測アプリ"
  xmlns="http://www.topografix.com/GPX/1/1"
  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
  xsi:schemaLocation="http://www.topografix.com/GPX/1/1 http://www.topografix.com/GPX/1/1/gpx.xsd">
  <metadata>
    <name>GeoPDF ウェイポイント</name>${areaDesc}
    <time>${now}</time>
  </metadata>
${wptTags}${rteptTags}
</gpx>`;

  // ダウンロード
  const blob = new Blob([gpx], { type: 'application/gpx+xml' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  toast(`GPX出力: ${filename}`, 'success', 3000);
}

const openInfoPanel = () => { updateWPList(); calcAreaSilent(); infoPanel.classList.add('open'); };
const closeInfoPanel= () => infoPanel.classList.remove('open');

btnWp.addEventListener('click', addWaypoint);
btnList.addEventListener('click', () => infoPanel.classList.contains('open') ? closeInfoPanel() : openInfoPanel());
btnArea.addEventListener('click', () => { calcArea(); openInfoPanel(); });
btnGpx.addEventListener('click', exportGPX);
btnClear.addEventListener('click', clearAll);
mapEl.addEventListener('click', () => { if(infoPanel.classList.contains('open')) closeInfoPanel(); });
$('btn-zoom-in').addEventListener('click',  () => zoomAt(mapEl.clientWidth/2,mapEl.clientHeight/2,1.5));
$('btn-zoom-out').addEventListener('click', () => zoomAt(mapEl.clientWidth/2,mapEl.clientHeight/2,1/1.5));

// ===== POINTER EVENTS =====
mapEl.addEventListener('mousedown', e => {
  if(!S.loaded) return;
  S.dragging=true;
  S.dragStart={x:e.clientX,y:e.clientY,px:S.panX,py:S.panY};
  mapEl.classList.add('grabbing');
});
window.addEventListener('mousemove', e => {
  if(!S.dragging) return;
  S.panX=S.dragStart.px+(e.clientX-S.dragStart.x);
  S.panY=S.dragStart.py+(e.clientY-S.dragStart.y);
  clampPan(); applyTransform();
});
window.addEventListener('mouseup', () => { S.dragging=false; mapEl.classList.remove('grabbing'); });
mapEl.addEventListener('wheel', e => {
  if(!S.loaded) return; e.preventDefault();
  zoomAt(e.clientX, e.clientY, e.deltaY<0?1.15:0.87);
},{passive:false});

mapEl.addEventListener('touchstart', e => {
  if(!S.loaded) return;
  if(e.touches.length===1){
    S.dragging=true; S.lastTouches=null;
    S.dragStart={x:e.touches[0].clientX,y:e.touches[0].clientY,px:S.panX,py:S.panY};
  } else if(e.touches.length===2){
    S.dragging=false; S.lastTouches=e.touches;
  }
  e.preventDefault();
},{passive:false});

mapEl.addEventListener('touchmove', e => {
  if(!S.loaded) return; e.preventDefault();
  if(e.touches.length===1&&S.dragging){
    S.panX=S.dragStart.px+(e.touches[0].clientX-S.dragStart.x);
    S.panY=S.dragStart.py+(e.touches[0].clientY-S.dragStart.y);
    clampPan(); applyTransform();
  } else if(e.touches.length===2&&S.lastTouches){
    const t0=e.touches[0],t1=e.touches[1];
    const p0=S.lastTouches[0],p1=S.lastTouches[1];
    const prevD=Math.hypot(p1.clientX-p0.clientX,p1.clientY-p0.clientY);
    const newD =Math.hypot(t1.clientX-t0.clientX,t1.clientY-t0.clientY);
    const cx=(t0.clientX+t1.clientX)/2, cy=(t0.clientY+t1.clientY)/2;
    zoomAt(cx, cy, newD/(prevD||1));
    S.lastTouches=e.touches;
  }
},{passive:false});

mapEl.addEventListener('touchend', e => {
  if(e.touches.length===0){S.dragging=false;S.lastTouches=null;}
  else if(e.touches.length===1){
    S.lastTouches=null;
    S.dragStart={x:e.touches[0].clientX,y:e.touches[0].clientY,px:S.panX,py:S.panY};
  }
},{passive:false});

// ===== UTILS =====
function haversine(lat1,lng1,lat2,lng2){
  const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

updateButtons();
</script>
